name: nebulacb
arch: amd64
platform: linux
version: 1.0.0
section: admin
priority: optional
maintainer: NebulaCB Maintainers <noreply@nebulacb.org>
description: |
  NebulaCB - The Complete Couchbase Management Platform.
  Upgrade, migrate, monitor, and protect Couchbase clusters
  with a real-time mission-control dashboard.
vendor: NebulaCB
homepage: https://github.com/bwalia/nebulacb
license: Apache-2.0

contents:
  - src: ../../bin/nebulacb
    dst: /usr/local/bin/nebulacb
    file_info:
      mode: 0755

  - src: ../../web/nebulacb-ui/build
    dst: /usr/local/share/nebulacb/web/nebulacb-ui/build

  - src: ../systemd/nebulacb.service
    dst: /etc/systemd/system/nebulacb.service
    file_info:
      mode: 0644

  - src: ../install/config.sample.json
    dst: /etc/nebulacb/config.json
    type: config|noreplace
    file_info:
      mode: 0640
      owner: root
      group: nebulacb

scripts:
  preinstall: scripts/preinstall.sh
  postinstall: scripts/postinstall.sh
  preremove: scripts/preremove.sh
  postremove: scripts/postremove.sh

overrides:
  rpm:
    depends:
      - shadow-utils
      - systemd
  deb:
    depends:
      - adduser
      - systemd
