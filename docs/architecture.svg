<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a" />
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c" />
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea" />
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="k3s-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="mac-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="100%" stop-color="#fef9c3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">NebulaCB — Architecture &amp; Data Flow</text>
  <text x="600" y="55" text-anchor="middle" font-size="12" fill="#64748b">Couchbase Upgrade &amp; XDCR Validation Platform on k3s</text>

  <!-- ==================== Mac / Local Machine ==================== -->
  <rect x="20" y="70" width="460" height="410" rx="10" fill="url(#mac-bg)" stroke="#eab308" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="35" y="92" font-size="13" font-weight="700" fill="#854d0e">Local Machine (macOS)</text>
  <text x="35" y="107" font-size="10" fill="#a16207">192.168.x.x — Go 1.24 / Node 18+</text>

  <!-- NebulaCB Server -->
  <rect x="40" y="120" width="200" height="130" rx="8" fill="#fff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="120" width="200" height="26" rx="8" fill="#2563eb"/>
  <rect x="40" y="138" width="200" height="8" fill="#2563eb"/>
  <text x="140" y="138" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">NebulaCB Server</text>
  <text x="140" y="156" text-anchor="middle" font-size="9" fill="#64748b">bin/nebulacb :8899</text>
  <text x="52" y="172" font-size="9" fill="#334155">Storm Generator</text>
  <text x="52" y="184" font-size="9" fill="#334155">XDCR Engine</text>
  <text x="52" y="196" font-size="9" fill="#334155">Validator</text>
  <text x="52" y="208" font-size="9" fill="#334155">Upgrade Orchestrator</text>
  <text x="140" y="220" font-size="9" fill="#334155">Monitor</text>
  <text x="140" y="232" font-size="9" fill="#334155">Failover / Backup</text>
  <circle cx="53" cy="169" r="3" fill="#16a34a"/>
  <circle cx="53" cy="181" r="3" fill="#16a34a"/>
  <circle cx="53" cy="193" r="3" fill="#16a34a"/>
  <circle cx="53" cy="205" r="3" fill="#16a34a"/>
  <circle cx="131" cy="217" r="3" fill="#16a34a"/>
  <circle cx="131" cy="229" r="3" fill="#16a34a"/>

  <!-- React Dashboard -->
  <rect x="260" y="120" width="200" height="80" rx="8" fill="#fff" stroke="#9333ea" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="260" y="120" width="200" height="26" rx="8" fill="#9333ea"/>
  <rect x="260" y="138" width="200" height="8" fill="#9333ea"/>
  <text x="360" y="138" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">React Dashboard</text>
  <text x="360" y="160" text-anchor="middle" font-size="9" fill="#64748b">web/nebulacb-ui :3000 (dev)</text>
  <text x="360" y="174" text-anchor="middle" font-size="9" fill="#334155">WebSocket + REST → :8899</text>
  <text x="360" y="188" text-anchor="middle" font-size="9" fill="#334155">Cluster Cards / XDCR Flow / Alerts</text>

  <!-- Arrow: Dashboard → Server -->
  <line x1="260" y1="160" x2="245" y2="160" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- CLI -->
  <rect x="260" y="215" width="200" height="55" rx="8" fill="#fff" stroke="#555" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="260" y="215" width="200" height="24" rx="8" fill="#475569"/>
  <rect x="260" y="231" width="200" height="8" fill="#475569"/>
  <text x="360" y="233" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">CLI Client</text>
  <text x="360" y="253" text-anchor="middle" font-size="9" fill="#64748b">bin/nebulacb-cli</text>
  <text x="360" y="263" text-anchor="middle" font-size="9" fill="#334155">status / start-load / audit / report</text>

  <!-- Arrow: CLI → Server -->
  <line x1="260" y1="248" x2="245" y2="210" stroke="#555" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- XDCR Load Test Script -->
  <rect x="40" y="270" width="200" height="65" rx="8" fill="#fff" stroke="#ea580c" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="270" width="200" height="24" rx="8" fill="#ea580c"/>
  <rect x="40" y="286" width="200" height="8" fill="#ea580c"/>
  <text x="140" y="288" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">XDCR Load Test</text>
  <text x="140" y="308" text-anchor="middle" font-size="9" fill="#64748b">cmd/xdcr-loadtest/main.go</text>
  <text x="140" y="322" text-anchor="middle" font-size="9" fill="#334155">Random writes → both clusters</text>

  <!-- kubectl port-forward -->
  <rect x="40" y="355" width="420" height="45" rx="8" fill="#fff" stroke="#0891b2" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="250" y="375" text-anchor="middle" font-size="11" font-weight="600" fill="#0891b2">kubectl port-forward (auto-managed by NebulaCB)</text>
  <text x="250" y="390" text-anchor="middle" font-size="9" fill="#64748b">REST API: localhost:random → pod:8091  |  SDK: couchbase://nodeIP:kvNodePort?network=external</text>

  <!-- Arrow: Server → port-forward -->
  <line x1="140" y1="250" x2="140" y2="350" stroke="#2563eb" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <text x="145" y="303" font-size="8" fill="#2563eb">REST monitor</text>

  <!-- Arrow: Load test → K3s (goes directly via NodePort) -->
  <path d="M 140 335 L 140 430 Q 140 445 155 445 L 480 445" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-orange)" fill="none"/>
  <text x="300" y="440" font-size="8" fill="#ea580c">NodePort (KV:32419 / KV:31942)</text>

  <!-- ==================== k3s Cluster ==================== -->
  <rect x="500" y="70" width="680" height="580" rx="10" fill="url(#k3s-bg)" stroke="#0284c7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="515" y="92" font-size="13" font-weight="700" fill="#0c4a6e">k3s Cluster (3 nodes)</text>
  <text x="515" y="107" font-size="10" fill="#0369a1">debian001 (140) · debian002 (47) · k3s-worker-01 (73) · slworker00 (193)</text>

  <!-- Namespace: couchbase -->
  <rect x="520" y="120" width="310" height="250" rx="8" fill="#fff" stroke="#16a34a" stroke-width="1.5" opacity="0.95" filter="url(#shadow)"/>
  <text x="535" y="140" font-size="11" font-weight="700" fill="#166534">namespace: couchbase</text>

  <!-- Couchbase Operator - source -->
  <rect x="535" y="150" width="140" height="40" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="605" y="168" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">CB Operator</text>
  <text x="605" y="180" text-anchor="middle" font-size="8" fill="#15803d">Helm: couchbase-operator</text>

  <!-- CB Source Pod -->
  <rect x="535" y="200" width="280" height="80" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="545" y="218" font-size="11" font-weight="700" fill="#166534">cb-local-0003</text>
  <text x="545" y="232" font-size="9" fill="#15803d">Couchbase Server v7.2.2 (Enterprise)</text>
  <text x="545" y="246" font-size="9" fill="#334155">Services: data, index, query</text>
  <text x="545" y="260" font-size="9" fill="#334155">Bucket: xdcr-test (18,800+ docs)</text>
  <text x="545" y="274" font-size="9" fill="#64748b">Node: slworker00 (192.168.1.193)</text>

  <!-- NodePort labels for source -->
  <rect x="700" y="150" width="115" height="55" rx="5" fill="#ecfdf5" stroke="#16a34a" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="757" y="165" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">NodePorts</text>
  <text x="710" y="178" font-size="8" fill="#334155">mgmt: 32451</text>
  <text x="710" y="189" font-size="8" fill="#334155">KV: 32419</text>
  <text x="710" y="200" font-size="8" fill="#334155">query: 32247</text>

  <!-- Source bucket icon -->
  <rect x="785" y="230" width="20" height="15" rx="3" fill="#16a34a" opacity="0.3"/>
  <text x="795" y="241" text-anchor="middle" font-size="8" fill="#166534">S</text>

  <!-- Namespace: couchbase-test -->
  <rect x="520" y="390" width="310" height="250" rx="8" fill="#fff" stroke="#dc2626" stroke-width="1.5" opacity="0.95" filter="url(#shadow)"/>
  <text x="535" y="410" font-size="11" font-weight="700" fill="#991b1b">namespace: couchbase-test</text>

  <!-- Couchbase Operator - target -->
  <rect x="535" y="420" width="140" height="40" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="605" y="438" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">CB Operator</text>
  <text x="605" y="450" text-anchor="middle" font-size="8" fill="#b91c1c">Helm: couchbase-operator-test</text>

  <!-- CB Target Pod -->
  <rect x="535" y="470" width="280" height="80" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="545" y="488" font-size="11" font-weight="700" fill="#991b1b">cb-test-0002</text>
  <text x="545" y="502" font-size="9" fill="#b91c1c">Couchbase Server v7.6.5 (Enterprise)</text>
  <text x="545" y="516" font-size="9" fill="#334155">Services: data, index, query</text>
  <text x="545" y="530" font-size="9" fill="#334155">Bucket: xdcr-test (18,800+ docs)</text>
  <text x="545" y="544" font-size="9" fill="#64748b">Node: slworker00 (192.168.1.193)</text>

  <!-- NodePort labels for target -->
  <rect x="700" y="420" width="115" height="55" rx="5" fill="#fef2f2" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="757" y="435" text-anchor="middle" font-size="9" font-weight="600" fill="#991b1b">NodePorts</text>
  <text x="710" y="448" font-size="8" fill="#334155">mgmt: 30953</text>
  <text x="710" y="459" font-size="8" fill="#334155">KV: 31942</text>
  <text x="710" y="470" font-size="8" fill="#334155">query: 30438</text>

  <!-- Target bucket icon -->
  <rect x="785" y="500" width="20" height="15" rx="3" fill="#dc2626" opacity="0.3"/>
  <text x="795" y="511" text-anchor="middle" font-size="8" fill="#991b1b">T</text>

  <!-- ==================== XDCR Bidirectional Arrows ==================== -->
  <!-- Source → Target -->
  <path d="M 660 285 Q 640 340 660 385" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="580" y="325" width="100" height="30" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="630" y="338" text-anchor="middle" font-size="9" font-weight="700" fill="#2563eb">XDCR</text>
  <text x="630" y="350" text-anchor="middle" font-size="8" fill="#2563eb">Bidirectional</text>

  <!-- Target → Source -->
  <path d="M 700 385 Q 720 340 700 285" stroke="#dc2626" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ==================== Port-forward arrow from local to k3s ==================== -->
  <line x1="460" y1="377" x2="515" y2="260" stroke="#0891b2" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="460" y1="377" x2="515" y2="510" stroke="#0891b2" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== Metrics / Prometheus ==================== -->
  <rect x="860" y="120" width="170" height="60" rx="8" fill="#fff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="860" y="120" width="170" height="22" rx="8" fill="#7c3aed"/>
  <rect x="860" y="135" width="170" height="7" fill="#7c3aed"/>
  <text x="945" y="137" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Prometheus Metrics</text>
  <text x="945" y="155" text-anchor="middle" font-size="9" fill="#64748b">:9090/metrics</text>
  <text x="945" y="168" text-anchor="middle" font-size="9" fill="#334155">ops/s, latency, doc counts</text>

  <!-- ==================== Storage ==================== -->
  <rect x="860" y="200" width="170" height="50" rx="8" fill="#fff" stroke="#64748b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="945" y="222" text-anchor="middle" font-size="10" font-weight="600" fill="#334155">Longhorn Storage</text>
  <text x="945" y="238" text-anchor="middle" font-size="9" fill="#64748b">PVC: couchbase-data (10Gi each)</text>

  <!-- ==================== Data Flow Legend ==================== -->
  <rect x="850" y="290" width="310" height="200" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)"/>
  <text x="865" y="312" font-size="12" font-weight="700" fill="#0f172a">Data Flow</text>

  <!-- Legend items -->
  <line x1="870" y1="330" x2="910" y2="330" stroke="#ea580c" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="920" y="334" font-size="9" fill="#334155">xdcr-loadtest → both clusters (NodePort KV)</text>

  <line x1="870" y1="352" x2="910" y2="352" stroke="#2563eb" stroke-width="2"/>
  <text x="920" y="356" font-size="9" fill="#334155">NebulaCB Server → clusters (port-forward REST)</text>

  <line x1="870" y1="374" x2="910" y2="374" stroke="#9333ea" stroke-width="1.5"/>
  <text x="920" y="378" font-size="9" fill="#334155">Dashboard → Server (WebSocket + REST)</text>

  <line x1="870" y1="396" x2="910" y2="396" stroke="#2563eb" stroke-width="2.5"/>
  <circle cx="890" cy="396" r="3" fill="#2563eb"/>
  <text x="920" y="400" font-size="9" fill="#334155">XDCR: source → target (internal k8s DNS)</text>

  <line x1="870" y1="418" x2="910" y2="418" stroke="#dc2626" stroke-width="2.5"/>
  <circle cx="890" cy="418" r="3" fill="#dc2626"/>
  <text x="920" y="422" font-size="9" fill="#334155">XDCR: target → source (bidirectional)</text>

  <line x1="870" y1="440" x2="910" y2="440" stroke="#0891b2" stroke-width="1.5"/>
  <text x="920" y="444" font-size="9" fill="#334155">kubectl port-forward (auto)</text>

  <line x1="870" y1="462" x2="910" y2="462" stroke="#555" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="920" y="466" font-size="9" fill="#334155">CLI → Server (HTTP Basic Auth)</text>

  <!-- ==================== Upgrade Path ==================== -->
  <rect x="850" y="510" width="310" height="130" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="850" y="510" width="310" height="24" rx="8" fill="#f59e0b"/>
  <rect x="850" y="526" width="310" height="8" fill="#f59e0b"/>
  <text x="1005" y="528" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Upgrade Test Workflow</text>

  <text x="865" y="552" font-size="9" fill="#334155">1. make run</text>
  <text x="945" y="552" font-size="9" fill="#64748b">→ Start dashboard :8899</text>
  <text x="865" y="567" font-size="9" fill="#334155">2. nebulacb-cli start-load</text>
  <text x="1028" y="567" font-size="9" fill="#64748b">→ Storm on source</text>
  <text x="865" y="582" font-size="9" fill="#334155">3. go run ./cmd/xdcr-loadtest/</text>
  <text x="1055" y="582" font-size="9" fill="#64748b">→ Both clusters</text>
  <text x="865" y="597" font-size="9" fill="#334155">4. nebulacb-cli start-upgrade</text>
  <text x="1035" y="597" font-size="9" fill="#64748b">→ Rolling 7.2→7.6</text>
  <text x="865" y="612" font-size="9" fill="#334155">5. nebulacb-cli run-audit</text>
  <text x="1020" y="612" font-size="9" fill="#64748b">→ Verify zero loss</text>
  <text x="865" y="627" font-size="9" fill="#334155">6. nebulacb-cli report</text>
  <text x="1005" y="627" font-size="9" fill="#64748b">→ Generate report</text>

  <!-- ==================== Version labels ==================== -->
  <rect x="40" y="430" width="100" height="22" rx="4" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="90" y="445" text-anchor="middle" font-size="9" font-weight="600" fill="#0c4a6e">Go 1.24</text>

  <rect x="150" y="430" width="100" height="22" rx="4" fill="#fce7f3" stroke="#db2777" stroke-width="1"/>
  <text x="200" y="445" text-anchor="middle" font-size="9" font-weight="600" fill="#9d174d">React 19 + TS</text>

  <rect x="260" y="430" width="100" height="22" rx="4" fill="#f3e8ff" stroke="#9333ea" stroke-width="1"/>
  <text x="310" y="445" text-anchor="middle" font-size="9" font-weight="600" fill="#6b21a8">gocb/v2 SDK</text>

  <rect x="370" y="430" width="90" height="22" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <text x="415" y="445" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">Helm 3</text>

  <!-- ==================== Config file callout ==================== -->
  <rect x="20" y="460" width="460" height="35" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1"/>
  <text x="250" y="478" text-anchor="middle" font-size="9" fill="#9a3412">config.json — source: 192.168.1.193:32451 (kv:32419) | target: 192.168.1.193:30953 (kv:31942)</text>
  <text x="250" y="490" text-anchor="middle" font-size="8" fill="#c2410c">kubeconfig: ~/.kube/k3s0.yaml | auth: admin/nebulacb | network=external for SDK</text>

  <!-- Footer -->
  <text x="600" y="885" text-anchor="middle" font-size="10" fill="#94a3b8">NebulaCB v1.0 — github.com/bwalia/nebulacb</text>
</svg>
